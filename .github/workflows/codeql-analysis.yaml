##
# Perform CodeQL analysis of GitHub Actions
name: codeql-analysis

on:
  push:
    branches:
    - "gha/v0"
    - "main"
  pull_request:
    branches:
      - "gha/v0"
      - "main"
  schedule:
    - cron: '32 12 * * 5'

# Default permissions for each job.
# Additional permissions should be assigned on a per-job basis.
permissions: { }

jobs:

  analyze:
    uses: apache/logging-parent/.github/workflows/codeql-analysis-reusable.yaml@gha/v0
    with:
      language: actions
    # Permissions required to publish Security Alerts
    permissions:
      actions: read
      contents: read
      security-events: write
